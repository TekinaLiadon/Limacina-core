name: On Pull Request

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint-code:
    name: Linter
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install

      - name: Check types
        run: bun run check-types
      - name: Check formatting
        run: bun run fmt:check
      - name: Check lints
        run: bun run lint

  test-code:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install

      - name: Tests
        run: bun test
